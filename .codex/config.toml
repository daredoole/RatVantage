# Codex CLI project-level configuration.
# Codex also reads AGENTS.md from the project root for coding guidelines.

[shell_environment_policy]
# Strip secrets from the shell environment before Codex sees it.
exclude = ["*_SECRET", "*_KEY", "*_TOKEN", "*_PASSWORD", "ANTHROPIC_*", "OPENAI_*", "GOOGLE_*"]

# Named permissions profile (required when using [permissions.<name>]). See:
# https://developers.openai.com/codex/config-reference
default_permissions = "ratvantage"

[permissions.ratvantage.filesystem]
# Block reads of large dirs that agents never need to edit.
# The sysfs fixtures are excluded here; agents can still read them via
# explicit tool calls when writing tests.
":project_roots" = {
  "target/**" = "none",
  ".git/**" = "none",
  "tests/fixtures/sysfs-82wm-confirmed/**" = "none",
  "tests/fixtures/sysfs-82wm-runtime-capture/**" = "none",
}
glob_scan_max_depth = 6
