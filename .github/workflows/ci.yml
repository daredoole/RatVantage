name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44@sha256:5ccaa26fd655e39c390c2a3c840884e13621fe46b40c6341f2c6a89f2acccb4b

    steps:
      - name: Install system test dependencies
        run: |
          dnf install -y \
            appstream \
            appstream-compose \
            cargo \
            curl \
            dbus \
            dbus-daemon \
            dbus-devel \
            desktop-file-utils \
            findutils \
            gcc \
            git \
            gitleaks \
            glib2-devel \
            gtk4-devel \
            ImageMagick \
            jetbrains-mono-fonts \
            libadwaita-devel \
            polkit-devel \
            pkgconf-pkg-config \
            python3-gobject \
            python3-pillow \
            python3-pyatspi \
            shadow-utils \
            systemd \
            systemd-devel \
            systemd-rpm-macros \
            tar \
            xz \
            xorg-x11-server-Xvfb

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2

      - name: Scan Git history for secrets
        run: gitleaks git --no-banner --redact

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Restore cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /github/home/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.2-${{ runner.os }}-${{ runner.arch }}

      - name: Install RustSec audit tool
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

      - name: Prepare unprivileged QA user
        run: |
          useradd --create-home --shell /bin/bash ratvantage

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run GTK smoke test
        run: xvfb-run -a cargo test -p legion-control-ui --features gtk-ui --test gtk_shell

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate packaging metadata
        run: scripts/validate-packaging.sh

      - name: Probe fixture smoke test
        run: cargo run -p legion-probe -- --json --sysfs-root tests/fixtures/sysfs-82wm-confirmed

      - name: Compatibility capture smoke test
        run: scripts/capture-compat-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --output /tmp/ratvantage-compat

      - name: Write validation harness smoke test
        run: scripts/capture-write-validation-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --output /tmp/ratvantage-write-validation --skip-compat-bundle --skip-tray-smoke

      - name: Local session launcher smoke test
        run: scripts/run-local-session-app.sh --frontend status --sysfs-root tests/fixtures/sysfs-82wm-confirmed

      - name: GTK screenshot smoke test
        run: scripts/capture-gtk-smoke-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --pages status,battery,gpu,fans --output /tmp/ratvantage-gtk-smoke

      - name: GUI QA evidence bundle
        run: |
          chown -R ratvantage:ratvantage "$GITHUB_WORKSPACE" /github/home/.cargo /github/home/.rustup
          runuser -u ratvantage -- env \
            HOME=/home/ratvantage \
            CARGO_HOME=/github/home/.cargo \
            RUSTUP_HOME=/github/home/.rustup \
            PATH="/github/home/.cargo/bin:$PATH" \
            scripts/qa-gui.sh

      - name: Print GUI QA review summary
        if: always()
        run: |
          if [ -f target/qa-report/review.md ]; then
            echo "RatVantage QA Review Summary"
            echo "================================"
            sed -n '1,180p' target/qa-report/review.md
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "## RatVantage QA Review Summary"
                echo
                sed -n '1,180p' target/qa-report/review.md
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "RatVantage QA Review Summary"
            echo "target/qa-report/review.md was not produced; full artifact upload will still run if files exist."
          fi

      - name: Daemon dry-run smoke test
        run: cargo run -p legion-control-daemon -- --dry-run

      - name: Upload GUI QA report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ratvantage-gui-qa-report
          path: target/qa-report
          if-no-files-found: warn
