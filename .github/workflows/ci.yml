name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus imagemagick libgtk-4-dev libadwaita-1-dev pkg-config xvfb

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run GTK smoke test
        run: xvfb-run -a cargo test -p legion-control-ui --features gtk-ui --test gtk_shell

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate packaging metadata
        run: scripts/validate-packaging.sh

      - name: Probe fixture smoke test
        run: cargo run -p legion-probe -- --json --sysfs-root tests/fixtures/sysfs-82wm-confirmed

      - name: Compatibility capture smoke test
        run: scripts/capture-compat-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --output /tmp/ratvantage-compat

      - name: Write validation harness smoke test
        run: scripts/capture-write-validation-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --output /tmp/ratvantage-write-validation --skip-compat-bundle --skip-tray-smoke

      - name: Local session launcher smoke test
        run: scripts/run-local-session-app.sh --frontend status --sysfs-root tests/fixtures/sysfs-82wm-confirmed

      - name: GTK screenshot smoke test
        run: scripts/capture-gtk-smoke-report.sh --sysfs-root tests/fixtures/sysfs-82wm-confirmed --pages status,battery --output /tmp/ratvantage-gtk-smoke

      - name: Daemon dry-run smoke test
        run: cargo run -p legion-control-daemon -- --dry-run
