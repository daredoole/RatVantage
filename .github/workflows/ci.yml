name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install D-Bus test dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Probe fixture smoke test
        run: cargo run -p legion-probe -- --json --sysfs-root tests/fixtures/sysfs-82wm-confirmed

      - name: Daemon dry-run smoke test
        run: cargo run -p legion-control-daemon -- --dry-run
